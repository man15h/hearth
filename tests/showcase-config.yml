branding:
  name: "Homelab"
  short_name: "homelab"
  description: "Self-hosted dashboard for your team, family, or org."
  logo: null
  favicon: null
  font:
    family: "JetBrains Mono"
    url: "https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
  theme_color: "#09090b"

auth:
  enabled: true
  oidc:
    issuer: "https://auth.example.com"
    client_id: "${OIDC_CLIENT_ID}"
    client_secret: "${OIDC_CLIENT_SECRET}"
    scopes: "openid profile groups"
    redirect_base: "https://home.example.com"
  admin_groups:
    - "admin"
  registration:
    enabled: false

customization:
  enabled: true

apps:
  - category: "Storage"
    items:
      - id: photos
        name: "Photos"
        url: "https://photos.example.com"
        icon: "di:immich"
        self_hosted: true
        default_visible: true
        setup_guide:
          subtitle: "Immich - Auto backup your photos & videos"
          steps:
            - label: "Download the app"
              desc: "Get Immich from the App Store or Play Store."
            - label: "Connect"
              desc: "Enter the server URL and sign in."

      - id: cloud
        name: "Cloud"
        url: "https://cloud.example.com"
        icon: "si:nextcloud"
        self_hosted: true
        default_visible: true
        setup_guide:
          subtitle: "Nextcloud - Private file storage & sync"
          steps:
            - label: "Download the app"
              desc: "Get Nextcloud from your app store."

      - id: paperless
        name: "Paperless"
        url: "https://docs.example.com"
        icon: "di:paperless-ngx"
        self_hosted: true
        default_visible: true
        setup_guide:
          subtitle: "Paperless-ngx - Document management"
          steps:
            - label: "Upload documents"
              desc: "Scan or upload documents from your phone."

  - category: "Social"
    items:
      - id: reddit
        name: "Reddit"
        url: "https://reddit.com"
        icon: "si:reddit"
        default_visible: true

      - id: mail
        name: "Mail"
        url: "https://mail.proton.me"
        icon: "di:proton-mail"
        default_visible: true

      - id: instagram
        name: "Instagram"
        url: "https://instagram.com"
        icon: "si:instagram"
        default_visible: true

      - id: discord
        name: "Discord"
        url: "https://discord.com/app"
        icon: "si:discord"
        default_visible: true

  - category: "Media"
    items:
      - id: youtube
        name: "YouTube"
        url: "https://youtube.com"
        icon: "si:youtube"
        default_visible: true

      - id: netflix
        name: "Netflix"
        url: "https://netflix.com"
        icon: "si:netflix"
        default_visible: true

      - id: spotify
        name: "Spotify"
        url: "https://open.spotify.com"
        icon: "si:spotify"
        default_visible: true

  - category: "Tools"
    items:
      - id: claude
        name: "Claude"
        url: "https://claude.ai"
        icon: "si:claude"
        default_visible: true

      - id: github
        name: "GitHub"
        url: "https://github.com"
        icon: "si:github"
        default_visible: true

      - id: bookmarks
        name: "Bookmarks"
        url: "https://links.example.com"
        icon: "si:instapaper"
        self_hosted: true
        default_visible: true

      - id: vault
        name: "Vault"
        url: "https://vault.example.com"
        icon: "si:bitwarden"
        self_hosted: true
        default_visible: true
        setup_guide:
          subtitle: "Bitwarden - Password manager"
          steps:
            - label: "Download"
              desc: "Get Bitwarden from your app store."

search:
  enabled: true
  url: "https://www.google.com/search"
  param: "q"

wallpapers:
  enabled: true
  source: "gitlab"
  count: 326

weather:
  enabled: true
  default_lat: 40.7128
  default_lon: -74.0060

onboarding:
  enabled: true
  welcome_text: "Your self-hosted hub — private cloud, media, and tools all in one place."

privacy:
  enabled: false

tips:
  enabled: false

news:
  enabled: false
