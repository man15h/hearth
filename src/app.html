<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Hearth</title>
	<meta name="description" content="Self-hosted dashboard">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<link rel="manifest" href="/manifest.json">
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='4 4 24 24'><circle cx='16' cy='16' r='9' fill='none' stroke='white' stroke-width='1.5'/><circle cx='16' cy='16' r='3' fill='white'/></svg>">
	<link rel="apple-touch-icon" href="/icon-192.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	%sveltekit.head%
</head>
<body class="min-h-dvh flex items-center justify-center" data-sveltekit-preload-data="hover">
	<script>
		// Apply theme from localStorage before first paint to prevent flash
		try {
			const p = JSON.parse(localStorage.getItem('hearth_prefs'));
			const t = p?.theme || localStorage.getItem('hearth_theme');
			if (t === 'light') document.body.classList.add('theme-light');
			else if (t === 'dark') document.body.classList.add('theme-dark');
		} catch {}
	</script>
	<div style="display: contents">%sveltekit.body%</div>
</body>
</html>
