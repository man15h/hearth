services:
  hearth:
    build: .
    ports:
      - "3000:3000"
    environment:
      - CONFIG_PATH=/app/config.yml
      - DATABASE_PATH=/app/data/hearth.db
      - NODE_ENV=production
      # OIDC secrets (set via .env or here):
      # - OIDC_CLIENT_ID=
      # - OIDC_CLIENT_SECRET=
    volumes:
      - ./config.yml:/app/config.yml:ro
      - hearth-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  hearth-data:
