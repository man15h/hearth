        setup_guide:
          subtitle: "Paperless-ngx - Document management"
          tip: "Scan and organize documents — searchable from anywhere"
          steps:
            - label: "Download the app"
              desc: "Get Swift Paperless from the App Store."
            - label: "Connect to server"
              desc: "Enter the server URL and sign in with your credentials."
            - label: "Upload documents"
              desc: "Scan or upload documents directly from your phone. They'll be auto-tagged and searchable."

