# ── Onboarding ──────────────────────────────────────────────
onboarding:
  enabled: true
  welcome_text: "A self-hosted server for friends and family. Your data stays on our hardware — no third-party clouds, no tracking, no ads."
  services:
    - id: photos
      desc: "100 GB auto-backup for photos & videos"
    - id: cloud
      desc: "50 GB private file storage & sync"
    - id: paperless
      desc: "Encrypted document scanning & search"
    - id: vault
      desc: "E2E encrypted password manager"
    - id: footprints
      desc: "Private location history tracking"
  slides:
    - type: welcome
    - type: services
    - type: privacy
      items:
        - text: "Your data lives on **our hardware** — never on third-party clouds"
        - text: "**Encrypted** storage with daily off-site backups"
        - text: "**No tracking**, no ads, no data selling — ever"
        - text: "**One login** for everything — just like Google, with an extra layer of security via **two-factor authentication**"
    - type: security
      items:
        - title: "Use strong passwords"
          desc: "Use a password manager and never reuse passwords across sites"
        - title: "Enable 2FA"
          desc: "Use a TOTP app like Aegis or Google Authenticator for all your accounts"
        - title: "Watch for phishing"
          desc: "Only enter credentials at auth.opposites.solar"
        - title: "Use the password manager"
          desc: "Secure all your logins with the built-in Vault — includes 2FA support for your accounts"
    - type: weather

# ── Privacy Policy ──────────────────────────────────────────
privacy:
  enabled: true
  file: "privacy.md"
  last_updated: "March 2026"

# ── Tips ────────────────────────────────────────────────────
