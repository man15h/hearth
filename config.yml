# Hearth Dashboard Configuration — Opposites INC
# Production config — synced to appdata via cm3588-sync.yml
# Secrets use ${ENV_VAR} syntax — substituted at load time from environment variables.

# ── Branding ─────────────────────────────────────────────────
branding:
  name: "Opposites INC"
  short_name: "opposites"
  description: "100 GB photo backup, 50 GB cloud storage, and a premium password manager — all free."
  logo: null
  favicon: null
  font:
    family: "JetBrains Mono"
    url: "https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
  theme_color: "#09090b"

# ── Authentication ───────────────────────────────────────────
auth:
  enabled: true
  oidc:
    issuer: "https://auth.opposites.solar"
    client_id: "${OIDC_CLIENT_ID}"
    client_secret: "${OIDC_CLIENT_SECRET}"
    scopes: "openid profile groups"
    redirect_base: "${OIDC_REDIRECT_BASE}"
  admin_groups:
    - "lldap_admin"
  password_change_url: "https://auth.opposites.solar/settings/security"
  registration:
    enabled: true
    url: "https://tally.so/r/2ELYYD"

# ── Customization ───────────────────────────────────────────
customization:
  enabled: true

# ── Apps / Bookmarks ────────────────────────────────────────
apps:
  - category: "Storage"
    items:
      - id: immich
        name: "Photos"
        url: "https://photos.opposites.solar"
        icon: "di:immich"
        icon_mono: "si:immich"
        self_hosted: true
        default_visible: true
        app_store:
          ios: "https://apps.apple.com/in/app/immich/id1613945652"
          android: "https://play.google.com/store/apps/details?id=app.alextran.immich"
        setup_guide:
          subtitle: "Immich - Auto backup your photos & videos"
          tip: "Back up your photos automatically — never lose a memory"
          steps:
            - label: "Download the app"
              desc: "Get Immich from the App Store or Play Store using the links above."
            - label: "Open & connect"
              desc: "Launch the app and enter the server URL when prompted."
            - label: "Sign in"
              desc: "Use your Opposites INC credentials (same as your login here)."
            - label: "Enable backup"
              desc: "Go to Settings > Backup and enable auto-upload for photos and videos."
            - label: "Allow permissions"
              desc: "Grant photo library and background refresh access for automatic uploads."

      - id: nextcloud
        name: "Cloud"
        url: "https://cloud.opposites.solar"
        icon: "nextcloud"
        tile_color: "#0082C9"
        self_hosted: true
        default_visible: true
        app_store:
          ios: "https://apps.apple.com/app/nextcloud/id1125420102"
          android: "https://play.google.com/store/apps/details?id=com.nextcloud.client"
        setup_guide:
          subtitle: "Nextcloud - Private file storage & sync"
          tip: "Sync your files across all devices — private cloud storage"
          steps:
            - label: "Download the app"
              desc: "Get Nextcloud from the App Store or Play Store."
            - label: "Add your account"
              desc: "Tap \"Log in\" and enter the server URL when prompted."
            - label: "Sign in via browser"
              desc: "You'll be redirected to sign in with your Opposites INC credentials."
            - label: "Start syncing"
              desc: "Choose which folders to sync and enable auto-upload for photos if desired."

      - id: paperless
        name: "Paperless"
        url: "https://paperless.opposites.solar"
        icon: "paperless-ngx"
        self_hosted: true
        default_visible: true
        app_store:
